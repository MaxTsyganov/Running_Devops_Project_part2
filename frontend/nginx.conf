# =============================================================
#  Nginx Configuration — Tier 1 (Frontend Server)
# =============================================================
#
#  This server does two things:
#    1. Serves the static HTML/JS frontend (index.html)
#    2. Reverse-proxies  /api/*  requests to the Backend API
#       server (Tier 2, running on a separate EC2 instance).
#
#  Install path:  /etc/nginx/conf.d/app.conf
#                 (remove the default.conf first)
#  Or replace:    /etc/nginx/nginx.conf
#
#  After editing: sudo nginx -t && sudo systemctl reload nginx
# =============================================================

# ── Redirect all HTTP traffic to HTTPS ────────────────────────────────
server {
    listen       80;
    server_name  _; 
    
    return 301 https://$host$request_uri;
}

# ── The Secure HTTPS Server ───────────────────────────────────────────
server {
    listen       443 ssl;
    server_name  _;

    # Point to the self-signed certificates
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # ── Static frontend files ─────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forward /api/* to the backend ─────────────────────
    location /api/ {
        proxy_pass         http://BACKEND_SERVER_IP:5000;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        client_max_body_size 50M;
    }

    # ── All other paths → serve the SPA ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Logging ───────────────────────────────────────────────────────
    access_log  /var/log/nginx/app_access.log;
    error_log   /var/log/nginx/app_error.log warn;
}
