# =============================================================
#  Nginx Configuration — Tier 1 (Frontend Server)
# =============================================================
#
#  This server does two things:
#    1. Serves the static HTML/JS frontend (index.html)
#    2. Reverse-proxies  /api/*  requests to the Backend API
#       server (Tier 2, running on a separate EC2 instance).
#
#  Install path:  /etc/nginx/conf.d/app.conf
#                 (remove the default.conf first)
#  Or replace:    /etc/nginx/nginx.conf
#
#  After editing: sudo nginx -t && sudo systemctl reload nginx
# =============================================================

server {
    listen       80;
    server_name  _;        # Accept any hostname / IP

    # ── Static frontend files ─────────────────────────────────────────────
    # Copy index.html to this directory:
    #   sudo cp frontend/index.html /usr/share/nginx/html/
    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forward /api/* to the backend ─────────────────────────
    #
    #  IMPORTANT: Replace  BACKEND_SERVER_IP  with the actual private IP
    #  (or internal DNS name) of your Backend EC2 instance.
    #  Use private IP here — keep backend traffic inside the VPC.
    #
    location /api/ {
        proxy_pass         http://BACKEND_SERVER_IP:5000;

        # Pass the real client IP to the backend for logging
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for file uploads (default 60s may be too short)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        # Allow large file uploads (adjust to your needs)
        client_max_body_size 50M;
    }

    # ── All other paths → serve the SPA ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Logging ──────────────────────────────────────────────────────────
    access_log  /var/log/nginx/app_access.log;
    error_log   /var/log/nginx/app_error.log warn;
}
