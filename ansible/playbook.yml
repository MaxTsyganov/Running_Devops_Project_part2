---
# ==============================================================================
# PLAY 1: BASE SETUP (Applies to all 3 servers)
# ==============================================================================
- name: Initialize Server Baseline
  hosts: all
  become: yes # Run as root (sudo)
  tasks:
    - name: Update apt cache and install base dependencies
      apt:
        name:
          - python3-pip
          - python3-venv
          - git
        state: present
        update_cache: yes

    - name: Create the main application directory
      file:
        path: /home/ubuntu/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

# ==============================================================================
# PLAY 2: FRONTEND (Nginx Reverse Proxy)
# ==============================================================================
- name: Deploy Frontend
  hosts: frontend
  become: yes
  vars_files:
    - vars.yml
    - secrets.yml
  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Copy index.html to Nginx web root
      copy:
        src: ../frontend/index.html
        dest: /usr/share/nginx/html/index.html

    - name: Copy Nginx configuration file
      copy:
        src: ../frontend/nginx.conf
        dest: /etc/nginx/conf.d/app.conf

    - name: Dynamically inject Backend Private IP into Nginx proxy
      replace:
        path: /etc/nginx/conf.d/app.conf
        regexp: 'BACKEND_SERVER_IP'
        replace: "{{ backend_private_ip }}"

    - name: Remove default Nginx welcome page
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart and enable Nginx service
      systemd:
        name: nginx
        state: restarted
        enabled: yes

# ==============================================================================
# PLAY 3: BACKEND (Python Flask API)
# ==============================================================================
- name: Deploy Backend API
  hosts: backend
  become: yes
  vars_files:
    - vars.yml
    - secrets.yml # Load our secure variables
  tasks:
    - name: Copy backend application code to server
      copy:
        src: ../backend/
        dest: /home/ubuntu/app/backend/
        owner: ubuntu
        group: ubuntu

    - name: Generate the .env file dynamically
      copy:
        dest: /home/ubuntu/app/backend/.env
        content: |
          DB_HOST={{ db_host }}
          DB_PORT=5432
          DB_NAME=appdb
          DB_USER=postgres
          DB_PASSWORD={{ db_password }}
          AWS_REGION=us-east-1
          S3_BUCKET_NAME={{ s3_bucket }}
          SNS_TOPIC_ARN={{ sns_arn }}

    - name: Fix OS User (Replace ec2-user with ubuntu in service file)
      replace:
        path: /home/ubuntu/app/backend/backend.service
        regexp: 'ec2-user'
        replace: 'ubuntu'

    - name: Create Python Virtual Environment and install Requirements
      pip:
        requirements: /home/ubuntu/app/backend/requirements.txt
        virtualenv: /home/ubuntu/app/backend/venv
        virtualenv_command: /usr/bin/python3 -m venv

    # ---> NEW INITIALIZATION TASK GOES HERE <---
    - name: Initialize PostgreSQL database tables
      ansible.builtin.shell: |
        source venv/bin/activate
        python -c "from app import init_db; init_db()"
      args:
        chdir: /home/ubuntu/app/backend
        executable: /bin/bash
    # -------------------------------------------

    - name: Register systemd service for Backend
      command: cp /home/ubuntu/app/backend/backend.service /etc/systemd/system/backend.service

    - name: Start and enable Backend service
      systemd:
        name: backend
        daemon_reload: yes
        state: restarted
        enabled: yes

# ==============================================================================
# PLAY 4: WORKER (Python Background Job)
# ==============================================================================
- name: Deploy Background Worker
  hosts: worker
  become: yes
  vars_files:
    - vars.yml
    - secrets.yml
  tasks:
    - name: Copy worker application code to server
      copy:
        src: ../worker/
        dest: /home/ubuntu/app/worker/
        owner: ubuntu
        group: ubuntu

    - name: Generate the .env file dynamically
      copy:
        dest: /home/ubuntu/app/worker/.env
        content: |
          DB_HOST={{ db_host }}
          DB_PORT=5432
          DB_NAME=appdb
          DB_USER=postgres
          DB_PASSWORD={{ db_password }}
          AWS_REGION=us-east-1
          SNS_TOPIC_ARN={{ sns_arn }}
          POLL_INTERVAL_SECONDS=30

    - name: Fix OS User (Replace ec2-user with ubuntu in service file)
      replace:
        path: /home/ubuntu/app/worker/worker.service
        regexp: 'ec2-user'
        replace: 'ubuntu'

    - name: Create Python Virtual Environment and install Requirements
      pip:
        requirements: /home/ubuntu/app/worker/requirements.txt
        virtualenv: /home/ubuntu/app/worker/venv
        virtualenv_command: /usr/bin/python3 -m venv

    - name: Register systemd service for Worker
      command: cp /home/ubuntu/app/worker/worker.service /etc/systemd/system/worker.service

    - name: Start and enable Worker service
      systemd:
        name: worker
        daemon_reload: yes
        state: restarted
        enabled: yes