---
# Step 1: Base Configuration (Applies to all servers)
- name: Initialize Server Baseline
  hosts: all
  become: yes 
  tasks:
    - name: Update apt cache and install base dependencies
      apt:
        name:
          - python3-pip
          - python3-venv
          - git
        state: present
        update_cache: yes

    - name: Create the main application directory
      file:
        path: /home/ubuntu/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

# Step 2: Configure the Frontend Web Server
- name: Deploy Frontend
  hosts: frontend
  become: yes
  vars_files:
    - vars.yml
  tasks:
    - name: Create SSL directory for secure connections
      file:
        path: /etc/nginx/ssl
        state: directory
        mode: '0755'

    - name: Generate a self-signed SSL certificate
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /etc/nginx/ssl/nginx.key
        -out /etc/nginx/ssl/nginx.crt
        -subj "/C=IL/ST=Israel/L=TelAviv/O=JohnBryce/OU=DevOps/CN=max-project.local"
      args:
        creates: /etc/nginx/ssl/nginx.crt
        
    - name: Install Nginx web server
      apt:
        name: nginx
        state: present

    - name: Copy the website files to the server
      copy:
        src: ../frontend/index.html
        dest: /usr/share/nginx/html/index.html

    - name: Copy the Nginx configuration settings
      copy:
        src: ../frontend/nginx.conf
        dest: /etc/nginx/conf.d/app.conf

    - name: Connect Nginx to the Backend using the dynamic IP
      replace:
        path: /etc/nginx/conf.d/app.conf
        regexp: 'BACKEND_SERVER_IP'
        replace: "{{ backend_private_ip }}"

    - name: Remove the default Nginx welcome page
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart and enable Nginx to apply changes
      systemd:
        name: nginx
        state: restarted
        enabled: yes

# Step 3: Configure the Python Backend API
- name: Deploy Backend API
  hosts: backend
  become: yes
  vars_files:
    - vars.yml
    - secrets.yml
  tasks:
    - name: Copy backend application code to the server
      copy:
        src: ../backend/
        dest: /home/ubuntu/app/backend/
        owner: ubuntu
        group: ubuntu

    - name: Create the .env configuration file dynamically
      copy:
        dest: /home/ubuntu/app/backend/.env
        content: |
          DB_HOST={{ db_host }}
          DB_PORT=5432
          DB_NAME=appdb
          DB_USER=postgres
          DB_PASSWORD={{ db_password }}
          AWS_REGION=us-east-1
          S3_BUCKET_NAME={{ s3_bucket }}
          SNS_TOPIC_ARN={{ sns_arn }}

    - name: Update the service file to use the ubuntu user
      replace:
        path: /home/ubuntu/app/backend/backend.service
        regexp: 'ec2-user'
        replace: 'ubuntu'

    - name: Create a Python Virtual Environment and install packages
      pip:
        requirements: /home/ubuntu/app/backend/requirements.txt
        virtualenv: /home/ubuntu/app/backend/venv
        virtualenv_command: /usr/bin/python3 -m venv

    - name: Initialize the database tables
      ansible.builtin.shell: |
        source venv/bin/activate
        python -c "from app import init_db; init_db()"
      args:
        chdir: /home/ubuntu/app/backend
        executable: /bin/bash

    - name: Register the system service for the Backend
      command: cp /home/ubuntu/app/backend/backend.service /etc/systemd/system/backend.service

    - name: Start and enable the Backend service
      systemd:
        name: backend
        daemon_reload: yes
        state: restarted
        enabled: yes

# Step 4: Configure the Background Worker
- name: Deploy Background Worker
  hosts: worker
  become: yes
  vars_files:
    - vars.yml
    - secrets.yml
  tasks:
    - name: Copy worker application code to the server
      copy:
        src: ../worker/
        dest: /home/ubuntu/app/worker/
        owner: ubuntu
        group: ubuntu

    - name: Create the .env configuration file dynamically
      copy:
        dest: /home/ubuntu/app/worker/.env
        content: |
          DB_HOST={{ db_host }}
          DB_PORT=5432
          DB_NAME=appdb
          DB_USER=postgres
          DB_PASSWORD={{ db_password }}
          AWS_REGION=us-east-1
          SNS_TOPIC_ARN={{ sns_arn }}
          POLL_INTERVAL_SECONDS=30

    - name: Update the service file to use the ubuntu user
      replace:
        path: /home/ubuntu/app/worker/worker.service
        regexp: 'ec2-user'
        replace: 'ubuntu'

    - name: Create a Python Virtual Environment and install packages
      pip:
        requirements: /home/ubuntu/app/worker/requirements.txt
        virtualenv: /home/ubuntu/app/worker/venv
        virtualenv_command: /usr/bin/python3 -m venv

    - name: Register the system service for the Worker
      command: cp /home/ubuntu/app/worker/worker.service /etc/systemd/system/worker.service

    - name: Start and enable the Worker service
      systemd:
        name: worker
        daemon_reload: yes
        state: restarted
        enabled: yes

# Step 5: Verify the Deployment
- name: Post-Deployment Health Checks
  hosts: frontend
  become: yes
  tasks:
    - name: Wait for services to fully initialize
      pause:
        seconds: 15

    - name: Verify the Frontend is serving the website
      uri:
        url: https://localhost/
        validate_certs: no
        return_content: yes
      register: frontend_check
      failed_when: frontend_check.status != 200

    - name: Verify the Backend API is reachable through the Proxy
      uri:
        url: https://localhost/api/
        validate_certs: no
        return_content: yes
      register: backend_check
      failed_when: backend_check.status == 502